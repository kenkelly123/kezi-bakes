backend:
  name: git-gateway
  branch: main

media_folder: public/IMAGES
public_folder: /IMAGES

collections:
  - name: "products"
    label: "Products"
    folder: "public/products"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Product Name", name: "name", widget: "string"}
      - {label: "Price", name: "price", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Visible on site", name: "visible", widget: "boolean", default: true}

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "public/site-settings.json"
        fields:
          - {label: "Hero Title", name: "heroTitle", widget: "string"}
          - {label: "Hero Subtitle", name: "heroSubtitle", widget: "string"}
          - {label: "Menu Image", name: "menuImage", widget: "image"}
